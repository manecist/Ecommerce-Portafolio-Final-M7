<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{public/layout/header :: head}"></head>
<body>
<div th:replace="~{public/layout/header :: header}"></div>

<main class="container mt-5 mb-5">

    <div class="text-center mb-4">
        <h1 class="fw-bolder display-5">📦 Gestión de Pedidos</h1>
        <p class="text-muted">Administra el estado de todos los pedidos del reino</p>
    </div>

    <!-- Mensajes flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4" style="border-radius: 15px;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm mb-4" style="border-radius: 15px;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtro por fecha -->
    <div class="card border-0 shadow-sm mb-4 p-3">
        <form th:action="@{/admin/pedidos}" method="get" class="row g-2 align-items-end">
            <input type="hidden" name="filtroEstado" th:value="${filtroActual}">
            <div class="col-sm-auto">
                <label class="form-label small fw-bold mb-1">Desde</label>
                <input type="date" name="fechaDesde" class="form-control input-magico form-control-sm"
                       th:value="${fechaDesde}">
            </div>
            <div class="col-sm-auto">
                <label class="form-label small fw-bold mb-1">Hasta</label>
                <input type="date" name="fechaHasta" class="form-control input-magico form-control-sm"
                       th:value="${fechaHasta}">
            </div>
            <div class="col-sm-auto d-flex gap-2">
                <button type="submit" class="btn btn-filtrar-magic btn-sm rounded-pill px-3">
                    <i class="bi bi-search me-1"></i> Filtrar
                </button>
                <a th:href="@{/admin/pedidos(filtroEstado=${filtroActual})}"
                   class="btn btn-limpiar-magic btn-sm rounded-pill px-3">
                    <i class="bi bi-x-circle me-1"></i> Limpiar fechas
                </a>
            </div>
        </form>
    </div>

    <!-- Filtro por estado (preserva fechas) -->
    <div class="d-flex flex-wrap gap-2 justify-content-center mb-4">
        <a th:href="@{/admin/pedidos(filtroEstado='TODOS', fechaDesde=${fechaDesde}, fechaHasta=${fechaHasta})}"
           th:classappend="${filtroActual == 'TODOS'} ? 'btn-filtrar-magic active' : 'btn-limpiar-magic'"
           class="btn rounded-pill px-4">
            Todos
        </a>
        <a th:each="estado : ${estados}"
           th:href="@{/admin/pedidos(filtroEstado=${estado.name()}, fechaDesde=${fechaDesde}, fechaHasta=${fechaHasta})}"
           th:classappend="${filtroActual == estado.name()} ? 'btn-filtrar-magic active' : 'btn-limpiar-magic'"
           th:text="${estado}"
           class="btn rounded-pill px-4">
        </a>
    </div>

    <!-- Sin resultados -->
    <div th:if="${#lists.isEmpty(pedidos)}" class="text-center py-5 carrito-vacio-box">
        <i class="bi bi-inbox display-1 text-muted"></i>
        <p class="fw-bold text-muted mt-3">No hay pedidos con este estado</p>
    </div>

    <!-- Tabla de pedidos -->
    <div th:unless="${#lists.isEmpty(pedidos)}" class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="carrito-thead">
                        <tr>
                            <th class="ps-4">#</th>
                            <th>Cliente</th>
                            <th>Email</th>
                            <th class="text-center">Productos</th>
                            <th class="text-center">Total</th>
                            <th class="text-center">Fecha</th>
                            <th class="text-center">Estado</th>
                            <th class="text-center">Cambiar Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="pedido : ${pedidos}">
                            <td class="ps-4 fw-bold" th:text="${pedido.id}"></td>
                            <td th:text="${pedido.nombreParaMostrar}"></td>
                            <td th:text="${pedido.emailContacto}"></td>
                            <td class="text-center" th:text="${pedido.items.size()}"></td>
                            <td class="text-center fw-bold precio-magico"
                                th:text="'$ ' + ${#numbers.formatInteger(pedido.total, 0, 'POINT')}"></td>
                            <td class="text-center"
                                th:text="${#temporals.format(pedido.fechaPedido, 'dd/MM/yy HH:mm')}"></td>
                            <td class="text-center">
                                <span class="badge estado-pedido-badge"
                                      th:classappend="${pedido.estado.name()}"
                                      th:text="${pedido.estado}">
                                </span>
                            </td>
                            <td class="text-center">
                                <form th:action="@{/admin/pedidos/estado}" method="post" class="d-flex gap-1 justify-content-center">
                                    <input type="hidden" name="pedidoId" th:value="${pedido.id}">
                                    <select name="nuevoEstado" class="form-select form-select-sm selector-magico" style="max-width: 160px;">
                                        <option th:each="e : ${estados}"
                                                th:value="${e.name()}"
                                                th:text="${e}"
                                                th:selected="${e == pedido.estado}">
                                        </option>
                                    </select>
                                    <button type="submit" class="btn btn-turquesa-magico btn-sm rounded-pill px-2" title="Actualizar">
                                        <i class="bi bi-check2"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{public/layout/footer :: footer}"></div>
</body>
</html>
