<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{public/layout/header :: head}"></head>
<body>
<div th:replace="~{public/layout/header :: header}"></div>

<main class="container mt-5 mb-5">

    <div class="text-center mb-4">
        <h1 class="fw-bolder display-5">🔔 Suscriptores</h1>
        <p class="text-muted">Gestiona las suscripciones al boletín de Magical Alliance</p>
    </div>

    <!-- Mensajes flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4" style="border-radius: 15px;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm mb-4" style="border-radius: 15px;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Sin suscriptores -->
    <div th:if="${#lists.isEmpty(suscriptores)}" class="text-center py-5 carrito-vacio-box">
        <i class="bi bi-bell-slash display-1 text-muted mb-3"></i>
        <p class="fw-bold text-muted">No hay suscriptores registrados</p>
    </div>

    <!-- Tabla de suscriptores -->
    <div th:unless="${#lists.isEmpty(suscriptores)}" class="card border-0 shadow-sm">
        <div class="card-header carrito-resumen-header text-white d-flex justify-content-between align-items-center py-3 px-4">
            <span class="fw-bold fs-5">Lista de suscriptores</span>
            <span class="badge bg-light text-dark"
                  th:text="${suscriptores.size()} + ' activos'"></span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="carrito-thead">
                        <tr>
                            <th class="ps-4">#</th>
                            <th>Email</th>
                            <th class="text-center">Fecha de suscripción</th>
                            <th class="text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s, stat : ${suscriptores}">
                            <td class="ps-4 text-muted" th:text="${stat.count}"></td>
                            <td class="fw-bold" th:text="${s.email}"></td>
                            <td class="text-center text-muted"
                                th:text="${#temporals.format(s.fechaSuscripcion, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="text-center">
                                <form th:action="@{'/admin/subscribir/' + ${s.id} + '/dar-baja'}" method="post">
                                    <button type="submit"
                                            class="btn btn-outline-danger btn-sm rounded-pill px-3"
                                            th:data-email="${s.email}"
                                            onclick="return confirm('¿Dar de baja a ' + this.dataset.email + '?')">
                                        <i class="bi bi-x-circle me-1"></i> Dar de baja
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{public/layout/footer :: footer}"></div>
</body>
</html>
