<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{public/layout/header :: head}"></head>
<body>
<div th:replace="~{public/layout/header :: header}"></div>

<main class="container mt-5 mb-5">

    <!-- Breadcrumb de pasos -->
    <div class="checkout-pasos d-flex justify-content-center gap-4 mb-5">
        <div class="checkout-paso completado">
            <span class="paso-numero">1</span>
            <span class="paso-label">Carrito</span>
        </div>
        <div class="checkout-paso-linea"></div>
        <div class="checkout-paso activo">
            <span class="paso-numero">2</span>
            <span class="paso-label">Checkout</span>
        </div>
        <div class="checkout-paso-linea"></div>
        <div class="checkout-paso">
            <span class="paso-numero">3</span>
            <span class="paso-label">Confirmación</span>
        </div>
    </div>

    <h2 class="fw-bolder text-center mb-4">🌙 Datos de tu Pedido</h2>

    <!-- Error global -->
    <div th:if="${error}" class="alert alert-danger shadow-sm mb-4" role="alert" style="border-radius: 15px;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    </div>

    <form th:action="@{/carrito/checkout}" th:object="${checkoutDTO}" method="post" class="needs-validation" novalidate>
        <input type="hidden" th:field="*{carritoId}">

        <div class="row g-4">

            <!-- Columna izquierda: datos del comprador -->
            <div class="col-lg-7">

                <!-- Datos de contacto -->
                <div class="card border-0 shadow-sm mb-4 checkout-card">
                    <div class="card-header checkout-card-header fw-bold">
                        <i class="bi bi-person-circle me-2"></i>Datos de Contacto
                    </div>
                    <div class="card-body p-4">

                        <!-- Aviso para invitados -->
                        <div sec:authorize="isAnonymous()" class="alert alert-info mb-4" style="border-radius: 12px; background: rgba(123,193,255,0.2); border-color: #7bc1ff;">
                            <i class="bi bi-info-circle me-2"></i>
                            Estás comprando como invitado.
                            <a th:href="@{/login}" class="fw-bold">Inicia sesión</a> para guardar tu historial de pedidos.
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nombre completo <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{nombreContacto}"
                                       class="form-control input-magico"
                                       th:classappend="${#fields.hasErrors('nombreContacto')} ? 'is-invalid' : ''"
                                       placeholder="Tu nombre completo" required>
                                <div class="invalid-feedback" th:errors="*{nombreContacto}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                                <input type="email" th:field="*{emailContacto}"
                                       class="form-control input-magico"
                                       th:classappend="${#fields.hasErrors('emailContacto')} ? 'is-invalid' : ''"
                                       placeholder="tu@email.com" required>
                                <div class="invalid-feedback" th:errors="*{emailContacto}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Teléfono</label>
                                <input type="tel" th:field="*{telefonoContacto}"
                                       class="form-control input-magico"
                                       placeholder="+56 9 1234 5678">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Dirección de entrega -->
                <div class="card border-0 shadow-sm mb-4 checkout-card">
                    <div class="card-header checkout-card-header fw-bold">
                        <i class="bi bi-geo-alt me-2"></i>Dirección de Entrega
                    </div>
                    <div class="card-body p-4">

                        <!-- Selector de dirección guardada (solo usuarios autenticados con direcciones) -->
                        <div sec:authorize="isAuthenticated()" th:if="${direcciones != null and !#lists.isEmpty(direcciones)}" class="mb-3">
                            <label class="form-label fw-bold">Seleccionar dirección guardada</label>
                            <select class="form-select selector-magico" id="selectDireccion" onchange="usarDireccionGuardada(this)">
                                <option value="">— Ingresar nueva dirección —</option>
                                <option th:each="dir : ${direcciones}"
                                        th:attr="data-calle=${dir.direccion}, data-ciudad=${dir.ciudad}, data-estado=${dir.estadoRegion}, data-pais=${dir.pais}, data-cp=${dir.codigoPostal}"
                                        th:value="${dir.id}"
                                        th:text="${dir.direccion + ', ' + dir.ciudad + (dir.esPrincipal ? ' ⭐' : '')}">
                                </option>
                            </select>
                        </div>

                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-bold">Calle y número <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{calle}" id="calle"
                                       class="form-control input-magico"
                                       th:classappend="${#fields.hasErrors('calle')} ? 'is-invalid' : ''"
                                       placeholder="Ej: Av. Los Andes 1234" required>
                                <div class="invalid-feedback" th:errors="*{calle}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Ciudad <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{ciudad}" id="ciudad"
                                       class="form-control input-magico"
                                       th:classappend="${#fields.hasErrors('ciudad')} ? 'is-invalid' : ''"
                                       placeholder="Ej: Santiago" required>
                                <div class="invalid-feedback" th:errors="*{ciudad}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Región / Estado <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{estadoRegion}" id="estadoRegion"
                                       class="form-control input-magico"
                                       th:classappend="${#fields.hasErrors('estadoRegion')} ? 'is-invalid' : ''"
                                       placeholder="Ej: Región Metropolitana" required>
                                <div class="invalid-feedback" th:errors="*{estadoRegion}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">País <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{pais}" id="pais"
                                       class="form-control input-magico"
                                       th:classappend="${#fields.hasErrors('pais')} ? 'is-invalid' : ''"
                                       placeholder="Ej: Chile" required>
                                <div class="invalid-feedback" th:errors="*{pais}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Código Postal</label>
                                <input type="text" th:field="*{codigoPostal}" id="codigoPostal"
                                       class="form-control input-magico"
                                       placeholder="Ej: 8320000">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Notas del pedido -->
                <div class="card border-0 shadow-sm checkout-card">
                    <div class="card-header checkout-card-header fw-bold">
                        <i class="bi bi-chat-text me-2"></i>Notas del Pedido (opcional)
                    </div>
                    <div class="card-body p-4">
                        <textarea th:field="*{notasPedido}"
                                  class="form-control input-magico"
                                  rows="2"
                                  placeholder="Instrucciones de entrega, mensajes especiales, etc."></textarea>
                    </div>
                </div>
            </div>

            <!-- Columna derecha: resumen del carrito -->
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm carrito-resumen-card sticky-top" style="top: 80px;">
                    <div class="card-header carrito-resumen-header text-white text-center fw-bold fs-5">
                        ✨ Resumen del Pedido
                    </div>
                    <div class="card-body p-4">

                        <!-- Ítems del carrito -->
                        <div th:each="item : ${carrito.items}" class="d-flex justify-content-between align-items-center mb-2">
                            <div>
                                <span class="fw-bold small" th:text="${item.producto.nombre}"></span>
                                <span class="badge bg-light text-dark ms-1 small" th:text="'x' + ${item.cantidad}"></span>
                            </div>
                            <span class="fw-bold small precio-magico"
                                  th:text="'$ ' + ${#numbers.formatInteger(item.subtotal, 0, 'POINT')}"></span>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-muted">Neto</span>
                            <span class="fw-bold" th:text="'$ ' + ${#numbers.formatInteger(carrito.total, 0, 'POINT')}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-1">
                            <span class="text-muted">IVA (19%)</span>
                            <span class="fw-bold" th:text="'$ ' + ${#numbers.formatInteger(carrito.total * 0.19, 0, 'POINT')}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Envío</span>
                            <span class="text-success fw-bold">Por coordinar</span>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between fs-5 fw-bold mb-4">
                            <span>Total</span>
                            <span class="precio-magico" th:text="'$ ' + ${#numbers.formatInteger(carrito.total * 1.19, 0, 'POINT')}"></span>
                        </div>

                        <button type="submit" class="btn btn-magico w-100 py-3 fw-bold rounded-pill shadow-sm fs-5">
                            <i class="bi bi-bag-check me-2"></i>Confirmar Pedido
                        </button>

                        <a th:href="@{/carrito}" class="btn btn-limpiar-magic w-100 mt-2 rounded-pill">
                            <i class="bi bi-arrow-left me-1"></i> Volver al carrito
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </form>
</main>

<div th:replace="~{public/layout/footer :: footer}"></div>

<script>
function usarDireccionGuardada(select) {
    const opt = select.options[select.selectedIndex];
    if (!opt.value) return; // "Ingresar nueva dirección" seleccionada
    document.getElementById('calle').value       = opt.dataset.calle  || '';
    document.getElementById('ciudad').value      = opt.dataset.ciudad || '';
    document.getElementById('estadoRegion').value = opt.dataset.estado || '';
    document.getElementById('pais').value        = opt.dataset.pais   || '';
    document.getElementById('codigoPostal').value = opt.dataset.cp    || '';
}
</script>
</body>
</html>
