<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{public/layout/header :: head}"></head>
<body>
<div th:replace="~{public/layout/header :: header}"></div>

<main class="container mt-5 mb-5">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4" role="alert" style="border-radius: 15px;">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm mb-4" role="alert" style="border-radius: 15px;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex align-items-center mb-4 gap-3">
        <a th:href="@{/mis-pedidos}" class="btn btn-limpiar-magic rounded-pill">
            <i class="bi bi-arrow-left"></i> Mis Pedidos
        </a>
        <h2 class="fw-bolder mb-0" th:text="'Pedido #' + ${pedido.id}"></h2>
        <span class="badge estado-pedido-badge ms-auto"
              th:classappend="${pedido.estado.name()}"
              th:text="${pedido.estado}">
        </span>
    </div>

    <div class="row g-4">

        <!-- Ítems del pedido -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm confirmacion-card mb-4">
                <div class="card-header checkout-card-header fw-bold">
                    <i class="bi bi-bag-heart me-2"></i>Productos Comprados
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead class="carrito-thead">
                                <tr>
                                    <th class="ps-4">Producto</th>
                                    <th class="text-center">Cantidad</th>
                                    <th class="text-center">Precio Unit.</th>
                                    <th class="text-center">Subtotal</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${pedido.items}">
                                    <td class="ps-4">
                                        <div class="d-flex align-items-center gap-3">
                                            <img th:if="${item.imagenProducto != null}"
                                                 th:src="${item.imagenProducto != null and !#strings.contains(item.imagenProducto, '/')} ? @{'/productos/' + ${item.imagenProducto}} : @{'/assets/img/' + ${item.imagenProducto}}"
                                                 class="carrito-img-producto rounded"
                                                 th:alt="${item.nombreProducto}">
                                            <span class="fw-bold" th:text="${item.nombreProducto}"></span>
                                        </div>
                                    </td>
                                    <td class="text-center" th:text="${item.cantidad}"></td>
                                    <td class="text-center precio-magico"
                                        th:text="'$ ' + ${#numbers.formatInteger(item.precioUnitario, 0, 'POINT')}"></td>
                                    <td class="text-center fw-bold precio-magico"
                                        th:text="'$ ' + ${#numbers.formatInteger(item.subtotal, 0, 'POINT')}"></td>
                                </tr>
                            </tbody>
                            <tfoot>
                                <tr class="table-light">
                                    <td colspan="3" class="text-end fw-bold ps-4 text-muted">Neto:</td>
                                    <td class="text-center fw-bold precio-magico"
                                        th:text="'$ ' + ${#numbers.formatInteger(pedido.subtotal, 0, 'POINT')}"></td>
                                </tr>
                                <tr class="table-light">
                                    <td colspan="3" class="text-end fw-bold ps-4 text-muted">IVA (19%):</td>
                                    <td class="text-center fw-bold precio-magico"
                                        th:text="'$ ' + ${#numbers.formatInteger(pedido.iva, 0, 'POINT')}"></td>
                                </tr>
                                <tr class="table-light border-top border-2">
                                    <td colspan="3" class="text-end fw-bold ps-4 fs-5">Total:</td>
                                    <td class="text-center fw-bold fs-5 precio-magico"
                                        th:text="'$ ' + ${#numbers.formatInteger(pedido.total, 0, 'POINT')}"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Datos de entrega -->
            <div class="card border-0 shadow-sm confirmacion-card">
                <div class="card-header checkout-card-header fw-bold">
                    <i class="bi bi-geo-alt me-2"></i>Datos de Entrega
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <p class="text-muted small mb-1">Nombre de contacto</p>
                            <p class="fw-bold" th:text="${pedido.nombreContacto}"></p>
                        </div>
                        <div class="col-md-6">
                            <p class="text-muted small mb-1">Email</p>
                            <p class="fw-bold" th:text="${pedido.emailContacto}"></p>
                        </div>
                        <div th:if="${pedido.telefonoContacto}" class="col-md-6">
                            <p class="text-muted small mb-1">Teléfono</p>
                            <p class="fw-bold" th:text="${pedido.telefonoContacto}"></p>
                        </div>
                        <div class="col-12">
                            <p class="text-muted small mb-1">Dirección de entrega</p>
                            <p class="fw-bold" th:text="${pedido.direccionEntrega}"></p>
                        </div>
                        <div th:if="${pedido.notasPedido}" class="col-12">
                            <p class="text-muted small mb-1">Notas</p>
                            <p th:text="${pedido.notasPedido}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel lateral: info del pedido -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm confirmacion-sidebar p-4">
                <h6 class="fw-bold mb-3"><i class="bi bi-info-circle me-2"></i>Información del Pedido</h6>
                <div class="mb-2">
                    <span class="text-muted small">Número de pedido</span>
                    <p class="fw-bold mb-0" th:text="'#' + ${pedido.id}"></p>
                </div>
                <div class="mb-2">
                    <span class="text-muted small">Fecha</span>
                    <p class="fw-bold mb-0" th:text="${#temporals.format(pedido.fechaPedido, 'dd/MM/yyyy HH:mm')}"></p>
                </div>
                <div class="mb-3">
                    <span class="text-muted small">Estado</span>
                    <p class="mb-0">
                        <span class="badge estado-pedido-badge"
                              th:classappend="${pedido.estado.name()}"
                              th:text="${pedido.estado}">
                        </span>
                    </p>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-1">
                    <span class="text-muted small">Neto</span>
                    <span class="fw-bold small" th:text="'$ ' + ${#numbers.formatInteger(pedido.subtotal, 0, 'POINT')}"></span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted small">IVA (19%)</span>
                    <span class="fw-bold small" th:text="'$ ' + ${#numbers.formatInteger(pedido.iva, 0, 'POINT')}"></span>
                </div>
                <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
                    <span>Total</span>
                    <span class="precio-magico" th:text="'$ ' + ${#numbers.formatInteger(pedido.total, 0, 'POINT')}"></span>
                </div>

                <!-- Acciones del cliente -->
                <hr>
                <!-- Cancelar: solo si no ha sido enviado/entregado/cancelado/devuelto -->
                <form th:if="${pedido.estado.name() == 'PENDIENTE' or pedido.estado.name() == 'CONFIRMADO' or pedido.estado.name() == 'EN_PREPARACION'}"
                      th:action="@{'/mis-pedidos/' + ${pedido.id} + '/cancelar'}" method="post" class="mb-2">
                    <button type="submit" class="btn btn-outline-danger w-100 rounded-pill"
                            onclick="return confirm('¿Confirmas la cancelación de este pedido? Se restaurará el stock.')">
                        <i class="bi bi-x-circle me-1"></i> Cancelar Pedido
                    </button>
                </form>
                <!-- Devolución: solo si ya fue enviado -->
                <form th:if="${pedido.estado.name() == 'ENVIADO'}"
                      th:action="@{'/mis-pedidos/' + ${pedido.id} + '/devolucion'}" method="post">
                    <button type="submit" class="btn btn-outline-warning w-100 rounded-pill"
                            onclick="return confirm('¿Solicitar devolución de este pedido?')">
                        <i class="bi bi-arrow-return-left me-1"></i> Solicitar Devolución
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{public/layout/footer :: footer}"></div>
</body>
</html>
