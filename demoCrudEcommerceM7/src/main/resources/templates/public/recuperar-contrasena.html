<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{public/layout/header :: head}"></head>
<body>
<div th:replace="~{public/layout/header :: header}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div th:if="${exito}" class="alert alert-magica bg-white border-0 shadow-sm mb-3 text-center text-success" role="alert">
                <i class="bi bi-check-circle-fill me-2" style="color: #00d4aa;"></i>
                <span th:text="${exito}"></span>
            </div>

            <div class="card card-login shadow-lg border-0">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-key-fill display-4 mb-3" style="color: #f480ff;"></i>

                    <h3 class="fw-bold mb-2 titulo-magico">Recuperar Contraseña</h3>
                    <p class="text-muted small mb-4">Ingresa tu correo y te enviaremos un enlace para crear una nueva contraseña.</p>

                    <form th:action="@{/recuperar-contrasena}" method="post" class="needs-validation" novalidate>

                        <div class="form-floating mb-4">
                            <input type="email" name="email" class="form-control input-magico"
                                   id="emailInput" placeholder="nombre@ejemplo.com" required>
                            <label for="emailInput" class="label-magico">Correo Electrónico</label>
                            <div class="invalid-feedback text-start">
                                Ingresa un correo válido.
                            </div>
                        </div>

                        <button type="submit" class="btn btn-magico-login w-100 py-2 fw-bold shadow-sm">
                            <i class="bi bi-send-fill me-2"></i>Enviar enlace de recuperación
                        </button>
                    </form>

                    <div class="mt-4 border-top pt-3">
                        <a th:href="@{/login}" class="btn btn-link btn-sm text-decoration-none text-muted">
                            <i class="bi bi-arrow-left me-1"></i> Volver al login
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{public/layout/footer :: footer}"></div>

<script>
    (function () {
        'use strict';
        document.querySelectorAll('.needs-validation').forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
</body>
</html>
