<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{public/layout/header :: head}"></head>
<body>
<div th:replace="~{public/layout/header :: header}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div th:if="${error}" class="alert alert-danger bg-white border-0 shadow-sm mb-3 text-center small"
                 role="alert" style="color: #ff4da6; border-left: 4px solid #f480ff !important;">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <div class="card card-login shadow-lg border-0">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-shield-lock-fill display-4 mb-3" style="color: #f480ff;"></i>

                    <h3 class="fw-bold mb-2 titulo-magico">Nueva Contraseña</h3>
                    <p class="text-muted small mb-4">Crea tu nueva contraseña. Debe tener al menos 8 caracteres, una mayúscula y un carácter especial.</p>

                    <form th:action="@{/nueva-contrasena}" method="post" class="needs-validation" novalidate id="formNueva">
                        <input type="hidden" name="token" th:value="${token}">

                        <div class="input-group mb-3 has-validation">
                            <div class="form-floating flex-grow-1">
                                <input type="password" name="password" class="form-control input-magico"
                                       id="passNew" placeholder="Nueva contraseña" required minlength="8"
                                       style="border-top-right-radius: 0 !important; border-bottom-right-radius: 0 !important;">
                                <label for="passNew" class="label-magico">Nueva contraseña</label>
                            </div>
                            <button class="btn btn-outline-secondary border-start-0" type="button"
                                    onclick="togglePass('passNew','eye1')"
                                    style="border-top-right-radius: 10px; border-bottom-right-radius: 10px;">
                                <i class="bi bi-eye label-magico" id="eye1"></i>
                            </button>
                            <div class="invalid-feedback text-start">Mínimo 8 caracteres requeridos.</div>
                        </div>

                        <div class="input-group mb-4 has-validation">
                            <div class="form-floating flex-grow-1">
                                <input type="password" name="confirmarPassword" class="form-control input-magico"
                                       id="passConfirm" placeholder="Confirmar contraseña" required minlength="8"
                                       style="border-top-right-radius: 0 !important; border-bottom-right-radius: 0 !important;">
                                <label for="passConfirm" class="label-magico">Confirmar contraseña</label>
                            </div>
                            <button class="btn btn-outline-secondary border-start-0" type="button"
                                    onclick="togglePass('passConfirm','eye2')"
                                    style="border-top-right-radius: 10px; border-bottom-right-radius: 10px;">
                                <i class="bi bi-eye label-magico" id="eye2"></i>
                            </button>
                            <div class="invalid-feedback text-start">Confirma tu contraseña.</div>
                        </div>

                        <button type="submit" class="btn btn-magico-login w-100 py-2 fw-bold shadow-sm">
                            <i class="bi bi-check-circle-fill me-2"></i>Guardar nueva contraseña
                        </button>
                    </form>

                    <div class="mt-4 border-top pt-3">
                        <a th:href="@{/login}" class="btn btn-link btn-sm text-decoration-none text-muted">
                            <i class="bi bi-arrow-left me-1"></i> Volver al login
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{public/layout/footer :: footer}"></div>

<script>
    function togglePass(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon  = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }

    (function () {
        'use strict';
        document.getElementById('formNueva').addEventListener('submit', function (event) {
            const p1 = document.getElementById('passNew').value;
            const p2 = document.getElementById('passConfirm').value;
            if (!this.checkValidity() || p1 !== p2) {
                event.preventDefault();
                event.stopPropagation();
                if (p1 !== p2) {
                    document.getElementById('passConfirm').setCustomValidity('Las contraseñas no coinciden.');
                } else {
                    document.getElementById('passConfirm').setCustomValidity('');
                }
                this.classList.add('was-validated');
            }
        }, false);

        document.getElementById('passConfirm').addEventListener('input', function () {
            this.setCustomValidity('');
        });
    })();
</script>
</body>
</html>
